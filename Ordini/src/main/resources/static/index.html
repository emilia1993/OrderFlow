<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderFlow</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        header {
            background: rgba(0,0,0,0.3);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fc;
            border-radius: 8px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        button.delete {
            background: #d9534f;
        }

        button.delete:hover {
            background: #c9302c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #2a5298;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

<header>
    OrderFlow - Order Management System
</header>

<div class="container">

    <!-- ================= GET ================= -->
    <div class="section">
        <h2>📋 Lista Ordini</h2>
        <button onclick="visualizzaOrdini()">Visualizza Ordini</button>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Descrizione</th>
                <th>Data Consegna</th>
                <th>Stato</th>
            </tr>
            </thead>
            <tbody id="ordiniTable"></tbody>
        </table>
    </div>

    <!-- ================= POST ================= -->
    <div class="section">
        <h2>➕ Crea Ordine</h2>

        <input type="text" id="descrizione" placeholder="Descrizione">
        <input type="date" id="dataConsegna">

        <select id="statoOrdine">
            <option value="IN_PREPARAZIONE">In Preparazione</option>
            <option value="SPEDITO">Spedito</option>
            <option value="IN_CONSEGNA">In Consegna</option>
            <option value="CONSEGNATO">Consegnato</option>
        </select>

        <button onclick="inserisciOrdine()">Crea</button>
    </div>

    <!-- ================= PUT ================= -->
    <div class="section">
        <h2>✏️ Aggiorna Ordine (PUT)</h2>

        <input type="number" id="updateId" placeholder="ID">
        <input type="text" id="updateDescrizione" placeholder="Nuova Descrizione">
        <input type="date" id="updateData">

        <select id="updateStato">
            <option value="IN_PREPARAZIONE">In Preparazione</option>
            <option value="SPEDITO">Spedito</option>
            <option value="IN_CONSEGNA">In Consegna</option>
            <option value="CONSEGNATO">Consegnato</option>
        </select>

        <button onclick="aggiornaOrdine()">Aggiorna</button>
    </div>

    <!-- ================= PATCH ================= -->
    <div class="section">
        <h2>🔄 Aggiorna Stato (PATCH)</h2>

        <input type="number" id="patchId" placeholder="ID">
        <select id="patchStato">
            <option value="IN_PREPARAZIONE">In Preparazione</option>
            <option value="SPEDITO">Spedito</option>
            <option value="IN_CONSEGNA">In Consegna</option>
            <option value="CONSEGNATO">Consegnato</option>
        </select>

        <button onclick="aggiornaStato()">Aggiorna Stato</button>
    </div>

    <!-- ================= DELETE ================= -->
    <div class="section">
        <h2>🗑 Elimina Ordine</h2>

        <input type="number" id="deleteId" placeholder="ID">
        <button class="delete" onclick="cancellaOrdine()">Elimina</button>
    </div>

</div>

<script>

    const API_URL = "http://localhost:8080/ordini";

    // 🔐 Credenziali Spring Security
    const AUTH = "Basic " + btoa("user:password");

    // ================= GET =================
    async function visualizzaOrdini() {

        const response = await fetch(API_URL, {
            headers: {
                "Authorization": AUTH
            }
        });

        if (!response.ok) {
            alert("Errore autenticazione: " + response.status);
            return;
        }

        const ordini = await response.json();
        const tbody = document.getElementById("ordiniTable");
        tbody.innerHTML = "";

        ordini.forEach(o => {
            tbody.innerHTML += `
                <tr>
                    <td>${o.id}</td>
                    <td>${o.descrizione}</td>
                    <td>${o.dataConsegna}</td>
                    <td>${o.statoOrdine}</td>
                </tr>
            `;
        });
    }

    // ================= POST =================
    async function inserisciOrdine() {

        const descrizione = document.getElementById("descrizione").value.trim();
        const dataConsegna = document.getElementById("dataConsegna").value;
        const statoOrdine = document.getElementById("statoOrdine").value;

        if (!descrizione || !dataConsegna) {
            alert("Compila tutti i campi obbligatori");
            return;
        }

        const ordine = { descrizione, dataConsegna, statoOrdine };

        await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": AUTH
            },
            body: JSON.stringify(ordine)
        });

        visualizzaOrdini();
    }

    // ================= PUT =================
    async function aggiornaOrdine() {

        const id = document.getElementById("updateId").value;

        const ordine = {
            descrizione: document.getElementById("updateDescrizione").value,
            dataConsegna: document.getElementById("updateData").value,
            statoOrdine: document.getElementById("updateStato").value
        };

        await fetch(`${API_URL}/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": AUTH
            },
            body: JSON.stringify(ordine)
        });

        visualizzaOrdini();
    }

    // ================= PATCH =================
    async function aggiornaStato() {

        const id = document.getElementById("patchId").value;
        const stato = document.getElementById("patchStato").value;

        await fetch(`${API_URL}/${id}/stato`, {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json",
                "Authorization": AUTH
            },
            body: JSON.stringify(stato)
        });

        visualizzaOrdini();
    }

    // ================= DELETE =================
    async function cancellaOrdine() {

        const id = document.getElementById("deleteId").value;

        await fetch(`${API_URL}/${id}`, {
            method: "DELETE",
            headers: {
                "Authorization": AUTH
            }
        });

        visualizzaOrdini();
    }

    // Auto-load
    window.onload = visualizzaOrdini;

</script>

</body>
</html>
